<div
  class="mt-3"
  [class.touch-pan-y]="mobileSwipe()"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  @if (mobileSwipe()) {
    <div
      class="flex snap-x snap-mandatory overflow-x-auto pb-2 [-ms-overflow-style:none] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"
      role="group"
      [attr.aria-label]="ariaLabel()"
    >
      @for (card of cards(); track card; let i = $index) {
        <div
          class="min-w-[4.5rem] max-w-[5rem] flex-1 snap-center transition-transform duration-200"
          [class.scale-105]="isSelected(card)"
          [class.opacity-90]="!isSelected(card)"
        >
          <app-voting-card
            [label]="card | voteLabel"
            [state]="cardState(card)"
            [focusTabIndex]="focusTabIndexFor(i)"
            [revealWave]="revealWave()"
            [staggerIndex]="i"
            (pick)="pick(card)"
            (focusin)="onCardFocus(i)"
            (deckNavigationKey)="onDeckNav($event, i)"
          />
        </div>
      }
    </div>
  } @else {
    <div
      class="grid w-full grid-cols-[repeat(auto-fill,minmax(4.5rem,1fr))] max-[480px]:grid-cols-[repeat(auto-fill,minmax(4rem,1fr))] max-[480px]:gap-2"
      role="group"
      [attr.aria-label]="ariaLabel()"
    >
      @for (card of cards(); track card; let i = $index) {
        <app-voting-card
          [label]="card | voteLabel"
          [state]="cardState(card)"
          [focusTabIndex]="focusTabIndexFor(i)"
          [revealWave]="revealWave()"
          [staggerIndex]="i"
          (pick)="pick(card)"
          (focusin)="onCardFocus(i)"
          (deckNavigationKey)="onDeckNav($event, i)"
        />
      }
    </div>
  }
</div>
