<div class="header">
  <div class="titles">
    <h1 class="title">{{ sessionTitle() || 'Planning session' }}</h1>
    <p class="meta">
      Session code: <code class="session-code" translate="no">{{ displayCode() }}</code>
    </p>
  </div>
  <button
    type="button"
    uiBtn="primary"
    (click)="onCopy()"
    [disabled]="!sessionId()"
    [attr.aria-disabled]="!sessionId() ? 'true' : null"
    aria-label="Copy session invite link to clipboard"
  >
    Copy invite
  </button>
</div>
