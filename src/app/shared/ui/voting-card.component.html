<button
  type="button"
  class="vote-deck-card"
  [class.vote-deck-card--default]="state() === 'default'"
  [class.vote-deck-card--selected]="state() === 'selected'"
  [class.vote-deck-card--revealed]="state() === 'revealed'"
  [class.vote-deck-card--disabled]="state() === 'disabled'"
  [class.vote-deck-card--pulse]="votePulse() && state() === 'selected'"
  [attr.tabindex]="effectiveTabIndex()"
  [attr.aria-disabled]="isDisabled() ? true : null"
  [attr.aria-pressed]="isDisabled() ? null : isSelectedLike()"
  [disabled]="isDisabled()"
  (click)="select()"
  (keydown)="onButtonKeydown($event)"
>
  <span class="vote-deck-card__label">{{ label() }}</span>
</button>
