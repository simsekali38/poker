<section class="ui-panel ui-panel--story ui-panel--hover" aria-labelledby="story-primary-heading">
  <div class="story-panel__toolbar">
    <p class="story-panel__eyebrow">Current story</p>
    @if (canEdit()) {
      <button type="button" uiBtn="secondary" uiBtnSize="sm" (click)="requestEdit()">Edit</button>
    }
  </div>

  @if (story(); as s) {
    <h2 id="story-primary-heading" class="story-panel__title">{{ s.title }}</h2>
    @if (s.description) {
      <p class="story-panel__desc">{{ s.description }}</p>
    }
  } @else {
    <h2 id="story-primary-heading" class="story-panel__title story-panel__title--empty">No story selected yet</h2>
  }
</section>
